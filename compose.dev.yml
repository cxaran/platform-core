name: platform-core-dev

x-backend-environment: &backend-environment
  ENVIRONMENT: local
  SECRET_KEY: dev-secret-key-change-me
  # Orígenes de navegador confiables para CSRF. Por defecto solo localhost; para probar
  # desde otro dispositivo en la LAN, exporta TRUSTED_BROWSER_ORIGINS incluyendo el
  # origen LAN (p. ej. "http://localhost:3000,http://192.168.0.213:3000").
  TRUSTED_BROWSER_ORIGINS: ${TRUSTED_BROWSER_ORIGINS:-http://localhost:3000}
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  EMAIL_TOKEN_EXPIRE_MINUTES: "30"
  TRYS_BEFORE_LOCK: "5"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_USER: dev@example.com
  SMTP_PASSWORD: dev-password
  SMTP_FROM_EMAIL: dev@example.com
  SMTP_FROM_NAME: Platform Core Dev
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_CREDENTIALS: "false"
  POSTGRES_USER: platform
  POSTGRES_PASSWORD: platform
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: platform_core

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    image: platform-core-backend:dev
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    expose:
      - "1025"
    restart: unless-stopped

  migrate:
    image: platform-core-backend:dev
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    image: platform-core-frontend:dev
    environment:
      API_PROXY_TARGET: http://backend:8000
      BACKEND_INTERNAL_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
      # Orígenes extra que el dev server de Next acepta (HMR/assets) al entrar desde la
      # LAN. CSV; vacío por defecto. Ej.: DEV_ALLOWED_ORIGINS=192.168.0.213
      DEV_ALLOWED_ORIGINS: ${DEV_ALLOWED_ORIGINS:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  redis_data:
  postgres_data:
  frontend_node_modules:
  frontend_next:
