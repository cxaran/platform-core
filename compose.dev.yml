name: platform-core-dev

x-backend-environment: &backend-environment
  ENVIRONMENT: local
  SECRET_KEY: dev-secret-key-change-me
  # Orígenes de navegador confiables para CSRF. Por defecto solo localhost; para probar
  # desde otro dispositivo en la LAN, exporta TRUSTED_BROWSER_ORIGINS incluyendo el
  # origen LAN (p. ej. "http://localhost:3000,http://192.168.0.213:3000").
  TRUSTED_BROWSER_ORIGINS: ${TRUSTED_BROWSER_ORIGINS:-http://localhost:3000,http://localhost:8080}
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  EMAIL_TOKEN_EXPIRE_MINUTES: "30"
  TRYS_BEFORE_LOCK: "5"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_USER: dev@example.com
  SMTP_PASSWORD: dev-password
  SMTP_FROM_EMAIL: dev@example.com
  SMTP_FROM_NAME: Platform Core Dev
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_CREDENTIALS: "false"
  POSTGRES_USER: platform
  POSTGRES_PASSWORD: platform
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: platform_core
  # Clave maestra de cifrado de secretos en reposo (Fernet). SOLO PARA DESARROLLO:
  # producción genera la suya en la instalación. Necesaria para guardar credenciales
  # de proveedor de IA (el cifrado es fail-closed).
  APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-maIG4L7m1vq_o0xdlzCoDifuhJl1sGtUaeQX_DeeeY8=}
  # Agent Gateway (copiloto): secretos COMPARTIDOS con el servicio model-gateway.
  # El backend firma el ticket con este secreto; el gateway lo verifica con el mismo
  # (GATEWAY_AGENT_TICKET_SECRET). El internal secret protege el arriendo de credencial.
  AGENT_GATEWAY_TICKET_SIGNING_SECRET: dev-agent-ticket-secret-shared
  AGENT_GATEWAY_INTERNAL_SECRET: dev-internal-lease-secret-shared

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    image: platform-core-backend:dev
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    expose:
      - "1025"
    restart: unless-stopped

  migrate:
    image: platform-core-backend:dev
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    # La imagen trae healthcheck de la API; este contenedor no la sirve.
    healthcheck:
      disable: true
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Tareas en segundo plano (Taskiq sobre PostgreSQL). Worker y scheduler con profile
  # explícito "taskiq" (docker compose --profile taskiq up taskiq-worker taskiq-scheduler);
  # `docker compose up` normal no los levanta. UNA sola réplica del scheduler.
  taskiq-worker:
    image: platform-core-backend:dev
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    healthcheck:
      disable: true
    command: [ "taskiq", "worker", "backend.app.taskiq_app:broker", "--workers", "1", "--max-async-tasks", "1" ]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    # Primer arranque: worker y scheduler pueden correr a la vez el CREATE TABLE IF NOT
    # EXISTS del broker y Postgres lanza UniqueViolation en pg_type (carrera conocida);
    # el reinicio la absorbe (la tabla ya existe en el segundo intento).
    restart: unless-stopped

  taskiq-scheduler:
    image: platform-core-backend:dev
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    healthcheck:
      disable: true
    command: [ "taskiq", "scheduler", "backend.app.taskiq_app:scheduler", "--skip-first-run" ]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # Agent Gateway (copiloto agéntico): runtime de inferencia neutral. El navegador
  # conecta por WebSocket bajo el MISMO origen (nginx → /model-gateway/). Comparte con
  # el backend los secretos de ticket y de arriendo interno. Fake habilitado en dev
  # para probar turnos sin credencial real de proveedor.
  model-gateway:
    build:
      context: ./model-gateway
      target: dev
    image: platform-core-gateway:dev
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: "8081"
      # tsx watch (chokidar) no recibe eventos por el bind mount en Windows sin polling.
      CHOKIDAR_USEPOLLING: "true"
      GATEWAY_PUBLIC_PATH_PREFIX: /model-gateway
      GATEWAY_ENABLE_ROOT_PATH_ALIAS: "true"
      # El navegador llega por nginx dev en http://localhost:8080 (origen del copiloto).
      GATEWAY_ALLOWED_ORIGINS: ${TRUSTED_BROWSER_ORIGINS:-http://localhost:3000,http://localhost:8080}
      # Mismos valores que el backend (verificación de ticket y arriendo interno).
      GATEWAY_AGENT_TICKET_SECRET: dev-agent-ticket-secret-shared
      GATEWAY_BACKEND_INTERNAL_URL: http://backend:8000
      GATEWAY_BACKEND_INTERNAL_SECRET: dev-internal-lease-secret-shared
      # Proveedor FAKE encendido en dev: permite ejercitar un turno completo sin
      # credencial ni red (útil para demo y pruebas end-to-end).
      GATEWAY_FAKE_ENABLED: "true"
    volumes:
      - ./model-gateway:/app
      - gateway_node_modules:/app/node_modules
    healthcheck:
      # El target dev no define healthcheck en la imagen (tsx watch): se define aquí.
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:8081/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    image: platform-core-frontend:dev
    # webpack (no Turbopack) SOLO en Docker: Turbopack sobre el bind mount de Windows
    # no descubre las rutas anidadas bajo un segmento dinámico ([resourceName]/...)
    # y esas páginas responden 404 (verificado en Next 16.2.9: mismo árbol resuelve
    # con webpack en el contenedor y con Turbopack fuera de Docker). Revisar al
    # actualizar Next por si el bug de Turbopack+bind mount queda corregido.
    command: ["npm", "run", "dev:docker"]
    environment:
      API_PROXY_TARGET: http://backend:8000
      BACKEND_INTERNAL_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
      # Orígenes extra que el dev server de Next acepta (HMR/assets). Incluye por defecto
      # el nginx dev (localhost:8080), la entrada same-origin del copiloto. Para probar
      # desde la LAN añade la IP: DEV_ALLOWED_ORIGINS=localhost:8080,192.168.0.213
      DEV_ALLOWED_ORIGINS: ${DEV_ALLOWED_ORIGINS:-localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

  # Documentación (MkDocs Material) bajo /docs del nginx dev; también publicada
  # directo en http://localhost:${DOCS_PORT:-8030}/docs/ para previsualizar.
  docs:
    image: squidfunk/mkdocs-material:9
    # --livereload EXPLÍCITO: con click >= 8.2 el default del flag en mkdocs 1.6
    # queda falsy y `serve` deja de vigilar archivos (sin él no hay rebuild).
    command: [ "serve", "--livereload", "--dev-addr=0.0.0.0:8000" ]
    volumes:
      - ./mkdocs.yml:/docs/mkdocs.yml:ro
      - ./docs:/docs/docs:ro
    ports:
      - "${DOCS_PORT:-8030}:8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/docs/', timeout=3).status == 200 else 1)" ]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  # Entrada nginx dev en UN solo origen (http://localhost:8080): necesaria para el
  # COPILOTO (cookie del gateway + WebSocket same-origin, el gateway no habla CORS).
  # El resto de la app sigue accesible directo en http://localhost:3000.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${DEV_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    # nginx valida upstreams al cargar la config: readiness real evita el crash-loop
    # del arranque en frío (frontend dev no tiene healthcheck: basta con created).
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      model-gateway:
        condition: service_healthy
      docs:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  gateway_node_modules:
