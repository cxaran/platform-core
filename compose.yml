name: platform-core

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    image: platform-core-backend:prod
    env_file: ${APP_ENV_FILE:-.env}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    image: platform-core-frontend:prod
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  migrate:
    image: platform-core-backend:prod
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]

volumes:
  redis_data:
