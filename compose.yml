name: platform-core

# Rotación de logs uniforme: sin esto, los json-file de Docker crecen sin límite y
# terminan llenando el disco del servidor (causa clásica de caída a los meses).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # PostgreSQL LOCAL opcional (profile "db"): para el despliegue autocontenido en un
  # VPS. El instalador lo activa vía COMPOSE_PROFILES en el .env; con base de datos
  # externa este servicio simplemente no existe (los depends_on son required:false).
  postgres:
    image: postgres:16-alpine
    profiles: [ "db" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      # El instalador SIEMPRE genera esta contraseña al elegir el contenedor local
      # (default vacío solo para que compose interpole con el profile inactivo).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-platform_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    image: platform-core-backend:prod
    # El archivo de entorno debe definir TRUSTED_BROWSER_ORIGINS con los orígenes
    # HTTPS públicos confiables; en producción la app falla al iniciar si está vacío.
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      # Métricas Prometheus coherentes con los 4 workers de gunicorn (modo
      # multiproceso de prometheus_client; el directorio lo crea la app al arrancar).
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    expose:
      - "8000"
    # Healthcheck definido en la imagen (GET /api/health con la stdlib).
    depends_on:
      redis:
        condition: service_healthy
      # Solo aplica con el profile "db" activo (PostgreSQL local del instalador).
      postgres:
        condition: service_healthy
        required: false
    logging: *default-logging
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    image: platform-core-frontend:prod
    expose:
      - "3000"
    healthcheck:
      # El manifest responde SIEMPRE (fallback estático si el backend no contesta):
      # mide la salud del propio Next sin acoplarla a la del backend.
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:3000/manifest.webmanifest').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # Agent Gateway (copiloto agéntico): runtime de inferencia neutral. nginx lo publica
  # bajo el MISMO origen en /model-gateway/ (para que el navegador reenvíe la cookie de
  # sesión). El archivo de entorno debe definir GATEWAY_AGENT_TICKET_SECRET (= el
  # AGENT_GATEWAY_TICKET_SIGNING_SECRET del backend), GATEWAY_BACKEND_INTERNAL_URL,
  # GATEWAY_BACKEND_INTERNAL_SECRET (= AGENT_GATEWAY_INTERNAL_SECRET) y GATEWAY_ALLOWED_ORIGINS.
  model-gateway:
    build:
      context: ./model-gateway
      target: runtime
    image: platform-core-gateway:prod
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8081"
      GATEWAY_PUBLIC_PATH_PREFIX: /model-gateway
    expose:
      - "8081"
    # Healthcheck definido en la imagen (GET /healthz).
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # Documentación (MkDocs Material) servida bajo /docs vía nginx. `mkdocs serve`
  # vigila docs/ y mkdocs.yml y reconstruye al detectar cambios (un git pull
  # actualiza la doc publicada sin pipeline).
  docs:
    image: squidfunk/mkdocs-material:9
    # --livereload EXPLÍCITO: con click >= 8.2 el default del flag en mkdocs 1.6
    # queda falsy y `serve` deja de vigilar archivos (sin él no hay rebuild).
    command: [ "serve", "--livereload", "--dev-addr=0.0.0.0:8000" ]
    volumes:
      - ./mkdocs.yml:/docs/mkdocs.yml:ro
      - ./docs:/docs/docs:ro
    expose:
      - "8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/docs/', timeout=3).status == 200 else 1)" ]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # El stack sirve HTTP en ${HTTP_PORT}; el HTTPS público vive FUERA del stack:
  # un túnel en el mismo servidor (p. ej. Cloudflare Tunnel apuntando a
  # http://127.0.0.1:<puerto>) o un proxy/balanceador externo (ALB/CloudFront…)
  # que termina TLS y reenvía al puerto del host.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # nginx valida sus upstreams al cargar la config: sin readiness real de los
    # cuatro, un arranque en frío entra en crash-loop hasta que todos existan.
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      model-gateway:
        condition: service_healthy
      docs:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  migrate:
    image: platform-core-backend:prod
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    # La imagen trae healthcheck de la API; este contenedor no la sirve.
    healthcheck:
      disable: true
    logging: *default-logging

  # Tareas en segundo plano (Taskiq sobre PostgreSQL). Worker y scheduler son procesos
  # PROPIOS con profile explícito "taskiq"; `docker compose up` normal no los levanta.
  # UNA sola réplica del scheduler.
  taskiq-worker:
    image: platform-core-backend:prod
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "taskiq", "worker", "backend.app.taskiq_app:broker", "--workers", "1", "--max-async-tasks", "1" ]
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    # El primer arranque puede chocar con el scheduler creando la tabla del broker a la
    # vez (UniqueViolation en pg_type); el reinicio lo absorbe.
    healthcheck:
      disable: true
    logging: *default-logging
    restart: unless-stopped

  taskiq-scheduler:
    image: platform-core-backend:prod
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "taskiq", "scheduler", "backend.app.taskiq_app:scheduler", "--skip-first-run" ]
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      disable: true
    logging: *default-logging
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
