# Entrada nginx del stack DEV (compose.dev.yml). Entrada única en un solo origen
# (http://localhost:8080 por defecto) para que el copiloto conecte al model-gateway por el
# MISMO origen que el frontend: así la cookie de sesión del gateway y el upgrade de
# WebSocket funcionan sin problemas cross-origin. Detrás siguen corriendo backend,
# frontend y model-gateway con recarga en caliente. El acceso directo al frontend en
# http://localhost:3000 sigue funcionando para todo lo que no es el copiloto.
server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # model-gateway: su prefijo público es /model-gateway, se reenvía el URI sin reescribir.
    # Incluye upgrade de WebSocket para /model-gateway/v1/ws.
    location /model-gateway/ {
        proxy_pass http://model-gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Frontend Next.js en modo dev. El upgrade de WebSocket también es necesario para el
    # Hot Module Reload (HMR) de Next durante el desarrollo.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
